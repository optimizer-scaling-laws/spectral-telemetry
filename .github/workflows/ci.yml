name: ci
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: python -m pip install --upgrade pip && pip install ruff
      - run: ruff check src tests examples benchmarks
      - run: ruff format --check src tests examples benchmarks
  core-numpy-only:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "${{ matrix.python-version }}"}
      - run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - run: python -m compileall -q src tests
      - run: python -m pytest -q   # torch tests auto-skip
  full-with-torch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: python -m pip install --upgrade pip && pip install -e ".[dev,torch]"
      - run: python -m pytest -q
      - run: python examples/probe_quickstart.py
      - run: python examples/transformer_lm.py
  build-and-wheel-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: python -m pip install --upgrade pip && pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - run: |
          python -m venv /tmp/wheel-env
          /tmp/wheel-env/bin/pip install dist/*.whl
          /tmp/wheel-env/bin/python -c "import spectral_telemetry as st; assert abs(st.soft_rank([1,1])-2)<1e-6; print('wheel OK', st.__version__)"
